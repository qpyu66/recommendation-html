<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RecSys 학습">
<meta name="theme-color" content="#1D9E75">
<title>추천 시스템 학습 허브</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="app-header">
  <h1>📚 추천 시스템 학습 허브</h1>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="prog-label">0 / 32 챕터 완료</div>
  </div>
</header>

<main class="main">

  <!-- ① 로드맵 화면 -->
  <div class="screen active" id="screen-map">
    <div class="type-filter-row">
      <button class="type-filter-btn active" data-type="all"       onclick="filterRoadmap('all')">전체</button>
      <button class="type-filter-btn" data-type="model"     onclick="filterRoadmap('model')">모델</button>
      <button class="type-filter-btn" data-type="algorithm" onclick="filterRoadmap('algorithm')">알고리즘</button>
      <button class="type-filter-btn" data-type="concept"   onclick="filterRoadmap('concept')">개념</button>
      <button class="type-filter-btn" data-type="metric"    onclick="filterRoadmap('metric')">평가지표</button>
    </div>
    <div class="roadmap-section">
      <div class="section-label">🟢 1단계 — 기초 개념</div>
      <div class="chip-row">
        <button class="chip current" onclick="goLesson(0)">Ch01-1 추천시스템이란?</button>
        <button class="chip" onclick="goLesson(1)">Ch01-3 알고리즘 종류</button>
      </div>
    </div>
    <div class="roadmap-section">
      <div class="section-label">🟣 2단계 — 평가 지표</div>
      <div class="chip-row">
        <button class="chip" onclick="goLesson(2)">Ch03-2 RMSE</button>
        <button class="chip" onclick="goLesson(3)">Ch03-3 NDCG</button>
      </div>
    </div>
    <div class="roadmap-section">
      <div class="section-label">🟠 3단계 — 컨텐츠 기반</div>
      <div class="chip-row">
        <button class="chip" onclick="goLesson(4)">Ch04-1 컨텐츠기반 필터링</button>
        <button class="chip" onclick="goLesson(5)">Ch04-4 근접이웃</button>
        <button class="chip" onclick="goLesson(6)">Ch04-4 나이브베이즈</button>
        <button class="chip" onclick="goLesson(7)">Ch04-5 TF-IDF</button>
      </div>
    </div>
    <div class="roadmap-section">
      <div class="section-label">🔵 4단계 — 협업 필터링</div>
      <div class="chip-row">
        <button class="chip" onclick="goLesson(8)">Ch05-1 이웃기반 CF</button>
        <button class="chip" onclick="goLesson(9)">Ch05-2 User/Item-based</button>
        <button class="chip" onclick="goLesson(10)">Ch05-3 자카드/피어슨</button>
        <button class="chip" onclick="goLesson(11)">Ch06-1 이웃 vs 모델기반</button>
        <button class="chip" onclick="goLesson(12)">Ch06-2 Rule-based</button>
        <button class="chip" onclick="goLesson(13)">Ch06-3 Matrix Factorization</button>
        <button class="chip" onclick="goLesson(14)">Ch06-4 SGD & ALS</button>
        <button class="chip" onclick="goLesson(15)">Ch06-5 Implicit/Explicit</button>
        <button class="chip" onclick="goLesson(16)">Ch06-6 BPR</button>
      </div>
    </div>
    <div class="roadmap-section">
      <div class="section-label">🟡 5단계 — 하이브리드 / 컨텍스트</div>
      <div class="chip-row">
        <button class="chip" onclick="goLesson(17)">Ch07-1 Hybrid</button>
        <button class="chip" onclick="goLesson(18)">Ch07-2 Context-Aware</button>
        <button class="chip" onclick="goLesson(19)">Ch07-3 Pre/Post-filtering</button>
        <button class="chip" onclick="goLesson(20)">Ch07-4 LARS</button>
      </div>
    </div>
    <div class="roadmap-section">
      <div class="section-label">🩷 6단계 — 딥러닝 기반</div>
      <div class="chip-row">
        <button class="chip" onclick="goLesson(21)">Ch08-4 Factorization Machine</button>
        <button class="chip" onclick="goLesson(22)">Ch08-7 Wide & Deep</button>
        <button class="chip" onclick="goLesson(23)">Ch08-9 DeepFM</button>
        <button class="chip" onclick="goLesson(24)">Ch08-11 AutoRec</button>
        <button class="chip" onclick="goLesson(25)">Ch08-12 Deep AutoEncoder</button>
        <button class="chip" onclick="goLesson(26)">Ch08-13 VAE</button>
      </div>
    </div>
    <div class="roadmap-section">
      <div class="section-label">🌿 7단계 — 실서비스 & 멀티모달</div>
      <div class="chip-row">
        <button class="chip" onclick="goLesson(27)">Ch09-1 텍스트 리뷰 기반</button>
        <button class="chip" onclick="goLesson(28)">Ch09-3 이미지 기반</button>
        <button class="chip" onclick="goLesson(29)">Ch09-4 VBPR</button>
        <button class="chip" onclick="goLesson(30)">Ch09-5 세션 기반 RNN</button>
        <button class="chip" onclick="goLesson(31)">Ch09-6 YouTube 추천</button>
      </div>
    </div>
  </div>

  <!-- ② 학습 화면 -->
  <div class="screen" id="screen-learn">
    <select class="chapter-selector" id="ch-selector" onchange="goLesson(parseInt(this.value))"></select>
    <div id="lesson-body"></div>
  </div>

  <!-- ③ 퀴즈 화면 -->
  <div class="screen" id="screen-quiz">
    <select class="chapter-selector" id="quiz-selector" onchange="renderQuiz(parseInt(this.value))"></select>
    <div id="quiz-body"></div>
  </div>

  <!-- ④ AI 튜터 화면 -->
  <div class="screen" id="screen-ai">
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px;">현재 챕터에 대해 AI 튜터에게 질문하세요.</p>
    <div class="quick-qs">
      <button class="quick-q-btn" onclick="askAI('추천시스템에서 Collaborative Filtering과 Content-based Filtering의 핵심 차이를 실무 예시로 설명해줘')">💡 CF vs Content-based 차이 →</button>
      <button class="quick-q-btn" onclick="askAI('Matrix Factorization의 Latent Factor가 무엇인지, 커머스에서 어떻게 해석할 수 있는지 설명해줘')">💡 MF Latent Factor 의미 →</button>
      <button class="quick-q-btn" onclick="askAI('NDCG와 RMSE를 추천시스템 평가에 사용할 때 각각 어떤 상황에 더 적합한지 알려줘')">💡 NDCG vs RMSE 비교 →</button>
      <button class="quick-q-btn" onclick="askAI('Implicit Feedback과 Explicit Feedback의 차이와 커머스 플랫폼 예시를 들어줘')">💡 Implicit / Explicit 피드백 →</button>
      <button class="quick-q-btn" onclick="askAI('Wide & Deep과 DeepFM 모델의 차이점과 각각 어떤 상황에 적합한지 설명해줘')">💡 Wide&Deep vs DeepFM →</button>
      <button class="quick-q-btn" onclick="askAI('YouTube 추천시스템의 surrogate problem이 무엇인지, 실무에서 어떻게 대응하는지 설명해줘')">💡 YouTube surrogate problem →</button>
    </div>
    <div class="chat-box">
      <div class="chat-header">
        <div class="chat-dot"></div>
        AI 튜터
      </div>
      <div class="chat-messages" id="ai-msgs">
        <div class="msg-ai">안녕하세요! 추천 시스템 학습을 도와드릴 AI 튜터입니다. 위의 빠른 질문을 누르거나 아래에 직접 입력해보세요 😊</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="ai-input" placeholder="질문 입력..." onkeydown="if(event.key==='Enter')sendAI()" />
        <button class="send-btn" onclick="sendAI()">↑</button>
      </div>
    </div>
  </div>

</main>

<!-- 바텀 네비게이션 -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-map" onclick="showScreen('map')">
    <span class="nav-icon">🗺️</span>로드맵
  </button>
  <button class="nav-item" id="nav-learn" onclick="showScreen('learn')">
    <span class="nav-icon">📖</span>학습
  </button>
  <button class="nav-item" id="nav-quiz" onclick="showScreen('quiz')">
    <span class="nav-icon">✏️</span>퀴즈
  </button>
  <button class="nav-item" id="nav-ai" onclick="showScreen('ai')">
    <span class="nav-icon">🤖</span>AI 튜터
  </button>
</nav>

<script src="js/app.js"></script>
</body>
</html>
